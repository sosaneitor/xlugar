name: Deploy to VPS

# Auto-deploy: cada push a main entra por SSH al VPS, hace git pull, build y
# reinicia la app con pm2. Requiere los secrets VPS_HOST / VPS_USER / VPS_SSH_KEY
# (ver DEPLOY-VPS.md, Parte 2). También se puede lanzar a mano desde la pestaña Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /var/www/xlugar
            git fetch --all
            git reset --hard origin/main
            npm ci
            DEPLOY_TARGET=node npm run build
            pm2 restart xlugar --update-env || HOST=127.0.0.1 PORT=4321 pm2 start dist/server/entry.mjs --name xlugar
            pm2 save
